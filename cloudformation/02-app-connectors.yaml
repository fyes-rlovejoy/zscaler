AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Zscaler ZPA App Connectors - compute layer.
  Deploys an Auto Scaling Group of App Connector instances (one per AZ) from the
  Zscaler Marketplace AMI, across the private subnets created by the network
  stack. Connectors enroll into the ZPA cloud at boot using a provisioning key
  read from SSM Parameter Store (SecureString). Outbound-only: no inbound from
  the internet.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Wiring }
        Parameters: [NetworkStackName]
      - Label: { default: App Connector image / sizing }
        Parameters: [AppConnectorAmiId, InstanceType, RootVolumeSizeGb, MinSize, MaxSize, DesiredCapacity]
      - Label: { default: ZPA enrollment }
        Parameters: [ProvisioningKeySsmParam]
      - Label: { default: Admin access (optional) }
        Parameters: [KeyPairName, AllowSshCidr]
      - Label: { default: Tagging }
        Parameters: [ProjectTag]

Parameters:
  NetworkStackName:
    Type: String
    Description: Name of the deployed network stack (01-network.yaml) to import subnets from.
    Default: zpa-network

  AppConnectorAmiId:
    Type: AWS::EC2::Image::Id
    Description: Zscaler ZPA App Connector AMI (from AWS Marketplace).
    Default: ami-00814956d4ff7ac6c

  InstanceType:
    Type: String
    Description: >-
      EC2 instance type. Zscaler recommends >= 2 vCPU / 8 GB for production
      App Connectors. m5.large is a solid GovCloud default.
    Default: m5.large
    AllowedValues: [t3.medium, t3.large, m5.large, m5.xlarge, m5a.large, m5a.xlarge, c5.large, c5.xlarge]

  RootVolumeSizeGb:
    Type: Number
    Description: Encrypted gp3 root volume size (GiB). AMI default is 16.
    Default: 30
    MinValue: 16
    MaxValue: 200

  MinSize:
    Type: Number
    Default: 2
    MinValue: 0

  MaxSize:
    Type: Number
    Default: 4
    MinValue: 1

  DesiredCapacity:
    Type: Number
    Description: Number of running connectors (2 = one per AZ for HA).
    Default: 2
    MinValue: 0

  ProvisioningKeySsmParam:
    Type: String
    Description: >-
      Name of the SSM Parameter Store SecureString holding the ZPA App Connector
      provisioning key. Created in the Zscaler API phase. The instance role is
      granted read+decrypt on exactly this parameter. Plain String (not
      SSM::Parameter::Name) so the stack can deploy before the key exists.
    Default: /zscaler/zpa/provisioning-key
    AllowedPattern: "^/[A-Za-z0-9._/-]+$"

  KeyPairName:
    Type: String
    Description: Optional EC2 key pair for SSH. Leave blank to rely on SSM Session Manager only.
    Default: ""

  AllowSshCidr:
    Type: String
    Description: >-
      Optional CIDR allowed inbound on TCP/22 for break-glass SSH. Leave blank
      for zero inbound (recommended; use SSM Session Manager instead).
    Default: ""
    AllowedPattern: "^$|^([0-9]{1,3}\\.){3}[0-9]{1,3}/(3[0-2]|[12]?[0-9])$"

  ProjectTag:
    Type: String
    Default: zscaler-app-connectors

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, ""]]
  HasSshCidr: !Not [!Equals [!Ref AllowSshCidr, ""]]

Resources:
  AppConnectorSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Zscaler ZPA App Connectors - outbound only.
      VpcId:
        Fn::ImportValue: !Sub "${NetworkStackName}-VpcId"
      # App Connectors initiate all sessions outbound to the Zscaler cloud
      # (443/TCP+UDP, DNS, NTP, dynamic broker ports). Allow all egress.
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: All outbound to Zscaler cloud and internal apps.
      Tags:
        - { Key: Name, Value: zpa-appconnector-sg }
        - { Key: Project, Value: !Ref ProjectTag }
        - { Key: ManagedBy, Value: CloudFormation }

  # Optional break-glass SSH ingress (only created if AllowSshCidr is set).
  AppConnectorSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasSshCidr
    Properties:
      GroupId: !Ref AppConnectorSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref AllowSshCidr
      Description: Break-glass SSH (restricted).

  AppConnectorRole:
    Type: AWS::IAM::Role
    Properties:
      Description: Role for ZPA App Connector instances (SSM + provisioning key read).
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: ec2.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        # SSM Session Manager for admin access without opening SSH.
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonSSMManagedInstanceCore"
      Policies:
        - PolicyName: read-provisioning-key
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadProvisioningKey
                Effect: Allow
                Action: [ssm:GetParameter, ssm:GetParameters]
                Resource: !Sub "arn:${AWS::Partition}:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ProvisioningKeySsmParam}"
              - Sid: DecryptProvisioningKey
                Effect: Allow
                Action: kms:Decrypt
                Resource: "*"
                Condition:
                  StringEquals:
                    kms:ViaService: !Sub "ssm.${AWS::Region}.amazonaws.com"
      Tags:
        - { Key: Project, Value: !Ref ProjectTag }

  AppConnectorInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref AppConnectorRole]

  AppConnectorLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${AWS::StackName}-zpa-appconnector"
      LaunchTemplateData:
        ImageId: !Ref AppConnectorAmiId
        InstanceType: !Ref InstanceType
        KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref "AWS::NoValue"]
        IamInstanceProfile:
          Arn: !GetAtt AppConnectorInstanceProfile.Arn
        SecurityGroupIds: [!Ref AppConnectorSecurityGroup]
        # Enforce IMDSv2.
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
          HttpPutResponseHopLimit: 1
        BlockDeviceMappings:
          - DeviceName: /dev/sda1
            Ebs:
              VolumeSize: !Ref RootVolumeSizeGb
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - { Key: Name, Value: zpa-appconnector }
              - { Key: Project, Value: !Ref ProjectTag }
              - { Key: ManagedBy, Value: CloudFormation }
          - ResourceType: volume
            Tags:
              - { Key: Name, Value: zpa-appconnector-root }
              - { Key: Project, Value: !Ref ProjectTag }
        UserData:
          Fn::Base64:
            Fn::Sub: |
              #!/bin/bash
              # Zscaler ZPA App Connector bootstrap + enrollment.
              # Uses only $VAR (no braces) for bash so CloudFormation Fn::Sub
              # only substitutes ${AWS::Region} and ${ProvisioningKeySsmParam}.
              set -uo pipefail
              exec > >(tee -a /var/log/zpa-userdata.log | logger -t zpa-userdata -s 2>/dev/console) 2>&1
              echo "[zpa-userdata] start $(date -u)"

              REGION="${AWS::Region}"
              SSM_PARAM="${ProvisioningKeySsmParam}"
              PK=""

              # The App Connector AMI is a minimal appliance; ensure aws cli exists.
              if ! command -v aws >/dev/null 2>&1; then
                echo "[zpa-userdata] installing aws cli v2"
                cd /tmp || exit 1
                curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
                command -v unzip >/dev/null 2>&1 || { yum install -y unzip || apt-get install -y unzip; }
                unzip -q awscliv2.zip && ./aws/install
                export PATH=$PATH:/usr/local/bin
              fi

              # Stop the connector service (auto-started before enrollment).
              systemctl stop zpa-connector || true

              # Fetch the provisioning key (SecureString) with retries; the
              # instance may briefly lack a route/credentials at first boot.
              for i in $(seq 1 10); do
                PK=$(aws ssm get-parameter --name "$SSM_PARAM" --with-decryption --region "$REGION" --query 'Parameter.Value' --output text 2>/tmp/ssm.err)
                if [ -n "$PK" ] && [ "$PK" != "None" ]; then break; fi
                echo "[zpa-userdata] SSM attempt $i failed: $(cat /tmp/ssm.err 2>/dev/null)"
                PK=""
                sleep 15
              done

              if [ -z "$PK" ]; then
                echo "[zpa-userdata] FATAL: could not read provisioning key from $SSM_PARAM"
                exit 1
              fi

              # Write the provisioning key and enroll into the ZPA cloud.
              mkdir -p /opt/zscaler/var
              echo "$PK" > /opt/zscaler/var/provision_key
              chmod 600 /opt/zscaler/var/provision_key
              unset PK

              systemctl enable zpa-connector
              systemctl start zpa-connector
              echo "[zpa-userdata] enrollment started $(date -u)"

  AppConnectorAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${AWS::StackName}-zpa-appconnectors"
      MinSize: !Ref MinSize
      MaxSize: !Ref MaxSize
      DesiredCapacity: !Ref DesiredCapacity
      HealthCheckType: EC2
      HealthCheckGracePeriod: 300
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub "${NetworkStackName}-AppConnectorSubnet1Id"
        - Fn::ImportValue: !Sub "${NetworkStackName}-AppConnectorSubnet2Id"
      LaunchTemplate:
        LaunchTemplateId: !Ref AppConnectorLaunchTemplate
        Version: !GetAtt AppConnectorLaunchTemplate.LatestVersionNumber
      Tags:
        - { Key: Name, Value: zpa-appconnector, PropagateAtLaunch: true }
        - { Key: Project, Value: !Ref ProjectTag, PropagateAtLaunch: true }
        - { Key: ManagedBy, Value: CloudFormation, PropagateAtLaunch: true }
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT5M

Outputs:
  AutoScalingGroupName:
    Value: !Ref AppConnectorAsg
  SecurityGroupId:
    Value: !Ref AppConnectorSecurityGroup
  InstanceRoleArn:
    Value: !GetAtt AppConnectorRole.Arn
  LaunchTemplateId:
    Value: !Ref AppConnectorLaunchTemplate
