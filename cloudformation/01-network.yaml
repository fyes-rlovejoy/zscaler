AWSTemplateFormatVersion: "2010-09-09"
Description: >-
  Zscaler ZPA App Connectors - network layer.
  Creates two small private subnets (one per AZ) in the existing general-vpc and
  associates them with the existing private route table (NAT egress). App
  Connectors make outbound-only connections, so these subnets need egress to the
  Zscaler cloud but no inbound from the internet.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label: { default: Existing network }
        Parameters: [VpcId, PrivateRouteTableId]
      - Label: { default: New App Connector subnets }
        Parameters: [AvailabilityZone1, SubnetCidr1, AvailabilityZone2, SubnetCidr2]
      - Label: { default: Tagging }
        Parameters: [ProjectTag]

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: Existing general-vpc.
    Default: vpc-09b4dbbf955d7862f

  PrivateRouteTableId:
    Type: String
    Description: >-
      Existing private route table to associate the new subnets with
      (general-rtb-private-us-gov-west-1, already routes 0.0.0.0/0 to the NAT GW).
    Default: rtb-07aa95919af0e668f
    AllowedPattern: "^rtb-[0-9a-f]{8,17}$"

  AvailabilityZone1:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-gov-west-1a

  SubnetCidr1:
    Type: String
    Description: CIDR for the AZ-1 App Connector subnet (small /28).
    Default: 172.32.10.192/28
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/(2[0-9]|3[0-2])$"

  AvailabilityZone2:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: us-gov-west-1b

  SubnetCidr2:
    Type: String
    Description: CIDR for the AZ-2 App Connector subnet (small /28).
    Default: 172.32.10.208/28
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/(2[0-9]|3[0-2])$"

  ProjectTag:
    Type: String
    Default: zscaler-app-connectors

Resources:
  AppConnectorSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      AvailabilityZone: !Ref AvailabilityZone1
      CidrBlock: !Ref SubnetCidr1
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: zpa-appconnector-private-1a }
        - { Key: Project, Value: !Ref ProjectTag }
        - { Key: Tier, Value: private }
        - { Key: ManagedBy, Value: CloudFormation }

  AppConnectorSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      AvailabilityZone: !Ref AvailabilityZone2
      CidrBlock: !Ref SubnetCidr2
      MapPublicIpOnLaunch: false
      Tags:
        - { Key: Name, Value: zpa-appconnector-private-1b }
        - { Key: Project, Value: !Ref ProjectTag }
        - { Key: Tier, Value: private }
        - { Key: ManagedBy, Value: CloudFormation }

  Subnet1RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppConnectorSubnet1
      RouteTableId: !Ref PrivateRouteTableId

  Subnet2RouteAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref AppConnectorSubnet2
      RouteTableId: !Ref PrivateRouteTableId

Outputs:
  AppConnectorSubnet1Id:
    Description: AZ-1 App Connector subnet.
    Value: !Ref AppConnectorSubnet1
    Export: { Name: !Sub "${AWS::StackName}-AppConnectorSubnet1Id" }

  AppConnectorSubnet2Id:
    Description: AZ-2 App Connector subnet.
    Value: !Ref AppConnectorSubnet2
    Export: { Name: !Sub "${AWS::StackName}-AppConnectorSubnet2Id" }

  VpcId:
    Description: VPC the subnets live in (re-exported for the connector stack).
    Value: !Ref VpcId
    Export: { Name: !Sub "${AWS::StackName}-VpcId" }
